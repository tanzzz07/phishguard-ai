<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="PhishGuard AI - Explainable phishing URL detection with machine learning, SHAP explainability, and RAG-powered threat analysis.">
    <title>PhishGuard AI — Explainable Threat Detection</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
</head>
<body>
    <!-- 3D Canvas Background -->
    <canvas id="bgCanvas" class="bg-canvas"></canvas>

    <div class="layout-wrapper" id="layoutWrapper">
    <div class="container">

        <!-- Hero / Search Section -->
        <section class="hero-section" id="heroSection">
            <header class="header">
                <div class="header__icon">🛡️</div>
                <h1 class="header__title">PhishGuard AI</h1>
                <p class="header__subtitle">Premium Explainable Threat Detection</p>
            </header>
        <section class="search-section">
            <div class="search-card">
                <form id="searchForm" class="search-form" autocomplete="off">
                    <input
                        type="text"
                        id="urlInput"
                        class="search-input"
                        placeholder="Enter a URL to analyze (e.g., https://example.com)"
                        required
                        spellcheck="false"
                    >
                    <button type="submit" id="submitBtn" class="search-btn">
                        <span class="search-btn__text">Analyze URL</span>
                        <div class="search-btn__spinner"></div>
                    </button>
                </form>
            </div>
        </section>

        <!-- Results Section -->
        <section id="results" class="results">

            <!-- Verdict Banner -->
            <div id="verdict" class="verdict verdict--safe">
                <div class="verdict__icon" id="verdictIcon">✅</div>
                <div>
                    <div class="verdict__label" id="verdictLabel">URL is Safe</div>
                    <div class="verdict__confidence" id="verdictConfidence">—</div>
                </div>
                <div class="verdict__score">
                    <div class="verdict__score-value" id="verdictScoreValue">0%</div>
                    <div class="verdict__score-label">Confidence</div>
                </div>
            </div>

            <!-- Cards Grid -->
            <div class="cards-grid">

                <!-- SHAP Feature Importance -->
                <div class="card" style="animation-delay: 0.2s">
                    <div class="card__header">
                        <div class="card__icon">📊</div>
                        <h2 class="card__title">Feature Impact (SHAP)</h2>
                    </div>
                    <div class="card__body">
                        <ul id="contribList" class="contrib-list"></ul>
                    </div>
                </div>

                <!-- Similar Phishing URLs -->
                <div class="card" style="animation-delay: 0.3s">
                    <div class="card__header">
                        <div class="card__icon">🔍</div>
                        <h2 class="card__title">Similar Phishing URLs (RAG)</h2>
                    </div>
                    <div class="card__body">
                        <ul id="similarList" class="similar-list"></ul>
                    </div>
                </div>

            </div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            PhishGuard AI &mdash; Built with XGBoost, SHAP, &amp; FAISS
        </footer>
    </div>

    <!-- Error Toast -->
    <div id="toast" class="toast"></div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="/static/three_scene.js"></script>
    <script src="/static/script.js"></script>
</body>
</html>
